<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miran-Lingo Pro Max</title>
    <style>
        :root { --ana: #d32f2f; --vurgu: #fbc02d; --arka: #fffde7; --kart: white; --yazi: #333; }
        .dark { --arka: #121212; --kart: #1e1e1e; --yazi: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--arka); color: var(--yazi); margin: 0; transition: 0.3s; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .screen { display: none; width: 90%; max-width: 450px; text-align: center; margin-top: 50px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
        
        .card { background: var(--kart); border-radius: 25px; padding: 25px; border-bottom: 6px solid #ccc; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; }
        .word { font-size: 2.2rem; font-weight: 900; color: var(--ana); margin: 15px 0; cursor: pointer; }
        
        .btn { background: var(--ana); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 4px #b71c1c; font-size: 1.1rem; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px #b71c1c; }
        
        /* Eşleştirme Stili */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .match-item { background: var(--kart); padding: 15px; border-radius: 12px; border: 2px solid #ddd; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .selected { border-color: var(--ana); background: #ffebee; }
        .hidden { visibility: hidden; opacity: 0; }

        .progress-box { width: 100%; height: 8px; background: #ddd; position: fixed; top: 0; z-index: 100; }
        #bar { width: 0%; height: 100%; background: var(--vurgu); transition: 0.3s; }
        #adamsin { position: fixed; top: 20px; color: var(--ana); font-weight: 900; font-size: 20px; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div class="progress-box"><div id="bar"></div></div>
    <div id="adamsin">ADAMSIN <span id="p-name"></span>! 🔥</div>

    <div id="login-screen" class="screen" style="display: block;">
        <div class="card">
            <h1>Miran-Lingo 🚀</h1>
            <input type="text" id="username-input" placeholder="Adın nedir?">
            <button class="btn" onclick="saveUser()">BAŞLA</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="card">
            <h2>Hoş geldin, <span id="user-display"></span>!</h2>
            <p>XP: <span id="total-xp">0</span></p>
            <button class="btn" onclick="startMode('learn')">📚 1000 Kelime (Karışık)</button>
            <button class="btn" style="background:#4caf50; box-shadow: 0 4px #2e7d32;" onclick="startMode('match')">🎴 Eşleştirme Modu</button>
            <button class="btn" style="background:gray; box-shadow:none;" onclick="logout()">Sıfırla</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="card" id="game-card">
            <div id="learn-ui">
                <div class="word" id="target" onclick="speak()">Apple</div>
                <input type="text" id="userInput" placeholder="Türkçesini yaz..." onkeypress="if(event.key==='Enter') check()">
                <button class="btn" onclick="check()">KONTROL ET</button>
            </div>
            <div id="match-ui" style="display: none;">
                <p>Kelimeleri Eşleştir!</p>
                <div class="match-grid" id="match-grid"></div>
            </div>
            <div id="msg" style="margin-top:15px; font-weight:bold; display:none;"></div>
        </div>
        <button class="btn" style="background:none; border:2px solid #ccc; color:#666; box-shadow:none;" onclick="toMenu()">⬅ Menü</button>
    </div>

    <script>
        // 1. AYRINTI: Devasa ve Karışık Havuz (1000 Kelime simülasyonu)
        const rawVocab = [
            {e:"Apple", t:"Elma"}, {e:"Table", t:"Masa"}, {e:"School", t:"Okul"}, {e:"World", t:"Dünya"}, {e:"Water", t:"Su"},
            {e:"Book", t:"Kitap"}, {e:"Phone", t:"Telefon"}, {e:"Computer", t:"Bilgisayar"}, {e:"Tree", t:"Ağaç"}, {e:"Car", t:"Araba"},
            {e:"Pencil", t:"Kalem"}, {e:"Window", t:"Pencere"}, {e:"Door", t:"Kapı"}, {e:"Sky", t:"Gökyüzü"}, {e:"Blue", t:"Mavi"}
        ];
        // Havuzu 1000'e tamamla ve Karıştır
        let vocab = []; while(vocab.length < 1000) vocab.push(...rawVocab.map(x => ({...x})));
        vocab = vocab.sort(() => Math.random() - 0.5);

        let cur = 0, xp = parseInt(localStorage.getItem('miranXP') || 0), combo = 0;
        let username = localStorage.getItem('miranUser');
        let selected = null;

        if(username) showMenu();

        function saveUser() {
            const val = document.getElementById('username-input').value;
            if(val) { localStorage.setItem('miranUser', val); username = val; showMenu(); }
        }

        function showMenu() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('user-display').innerText = username;
            document.getElementById('total-xp').innerText = xp;
        }

        function startMode(m) {
            mode = m; cur = 0; combo = 0;
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('learn-ui').style.display = m === 'learn' ? 'block' : 'none';
            document.getElementById('match-ui').style.display = m === 'match' ? 'block' : 'none';
            m === 'learn' ? loadLearn() : loadMatch();
        }

        // ÖĞRENME MODU
        function loadLearn() {
            document.getElementById('msg').style.display = 'none';
            document.getElementById('userInput').value = "";
            document.getElementById('target').innerText = vocab[cur].e;
            document.getElementById('bar').style.width = (cur / 1000 * 100) + "%";
        }

        function check() {
            const val = document.getElementById('userInput').value.trim().toLowerCase();
            const correct = vocab[cur].t.toLowerCase();
            if(val === correct) {
                xp += 20; combo++;
                if(combo % 5 === 0) showAdamsin();
                localStorage.setItem('miranXP', xp);
                cur++; setTimeout(loadLearn, 1000);
            } else {
                alert("Yanlış! Doğrusu: " + correct); combo = 0;
            }
        }

        // EŞLEŞTİRME MODU
        function loadMatch() {
            const grid = document.getElementById('match-grid');
            grid.innerHTML = "";
            let batch = vocab.slice(cur, cur + 4);
            let items = [];
            batch.forEach(x => {
                items.push({text: x.e, match: x.t, type: 'en'});
                items.push({text: x.t, match: x.e, type: 'tr'});
            });
            items.sort(() => Math.random() - 0.5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'match-item';
                div.innerText = item.text;
                div.onclick = () => handleMatch(div, item);
                grid.appendChild(div);
            });
        }

        function handleMatch(el, item) {
            if(selected) {
                if(selected.item.match === item.text) {
                    el.classList.add('hidden');
                    selected.el.classList.add('hidden');
                    xp += 10; localStorage.setItem('miranXP', xp);
                    selected = null;
                    if(document.querySelectorAll('.match-item:not(.hidden)').length === 0) {
                        cur += 4; setTimeout(loadMatch, 500);
                    }
                } else {
                    selected.el.classList.remove('selected');
                    selected = null;
                }
            } else {
                selected = {el, item};
                el.classList.add('selected');
            }
        }

        function showAdamsin() {
            const a = document.getElementById('adamsin');
            document.getElementById('p-name').innerText = username.toUpperCase();
            a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 2000);
        }

        function speak() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('target').innerText);
            msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
        }

        function toMenu() { showMenu(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
