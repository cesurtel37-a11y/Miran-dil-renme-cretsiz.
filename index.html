<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miran-Lingo Master</title>
    <style>
        :root { --ana: #d32f2f; --vurgu: #fbca03; --arka: #fffde7; --kart: white; --yazi: #333; }
        .dark { --arka: #121212; --kart: #1e1e1e; --yazi: #f1f1f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--arka); color: var(--yazi); margin: 0; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        
        /* Navigasyon */
        .top-nav { width: 100%; padding: 15px; background: var(--ana); color: white; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; font-weight: bold; }
        
        .screen { display: none; width: 90%; max-width: 450px; margin-top: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        .card { background: var(--kart); border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-bottom: 6px solid #bbb; text-align: center; margin-bottom: 20px; }
        
        /* İpucu Stili */
        .hint-text { font-size: 0.8rem; color: #888; cursor: pointer; text-decoration: underline; margin-top: 5px; }
        .hint-box { background: rgba(251, 202, 3, 0.2); padding: 5px; border-radius: 8px; display: none; margin-top: 5px; color: #d32f2f; font-weight: bold; }

        /* Cümle Kurma Stili */
        .word-box { display: inline-block; padding: 10px 15px; background: #eee; margin: 5px; border-radius: 10px; cursor: pointer; border-bottom: 3px solid #ccc; font-weight: bold; color: #333; }
        .word-box:active { transform: translateY(2px); border-bottom: none; }
        .sentence-area { min-height: 50px; border-bottom: 2px dashed #ccc; margin-bottom: 20px; padding: 10px; }

        /* Sözlük Stili */
        .dict-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; color: white; }
        .btn-red { background: var(--ana); } .btn-green { background: #4caf50; } .btn-blue { background: #2196f3; }
    </style>
</head>
<body>

<div class="top-nav">
    <div>👤 <span id="u-name">Miran</span></div>
    <div>✨ XP: <span id="u-xp">0</span></div>
    <div onclick="document.body.classList.toggle('dark')">🌙</div>
</div>

<div id="login-screen" class="screen" style="display: block;">
    <div class="card">
        <h1>Miran-Lingo Master 🚀</h1>
        <input type="text" id="name-input" placeholder="İsmini yaz..." style="width:80%; padding:10px; border-radius:10px; border:1px solid #ccc;">
        <button class="btn btn-red" style="margin-top:20px;" onclick="saveUser()">GİRİŞ YAP</button>
    </div>
</div>

<div id="menu-screen" class="screen">
    <div class="card">
        <h2>Hoş geldin <span id="display-name"></span>!</h2>
        <button class="btn btn-red" onclick="showScreen('level-screen')">📚 Kelime Öğren (A1-B2)</button>
        <button class="btn btn-green" onclick="showScreen('sentence-level-screen')">✍️ Cümle Kur (Duolingo Tarzı)</button>
        <button class="btn btn-blue" onclick="showScreen('dict-screen')">📖 Dev Sözlük (Tüm Kelimeler)</button>
        <button class="btn" style="background:gray;" onclick="reset()">Sıfırla</button>
    </div>
</div>

<div id="level-screen" class="screen">
    <div class="card">
        <h3>Seviye Seç</h3>
        <button class="btn" style="background:#4caf50" onclick="startLearn('A1')">🟢 A1 SEVİYESİ</button>
        <button class="btn" style="background:#2196f3" onclick="startLearn('A2')">🔵 A2 SEVİYESİ</button>
        <button class="btn" style="background:#9c27b0" onclick="startLearn('B1')">🟣 B1 SEVİYESİ</button>
        <button class="btn" style="background:#ff9800" onclick="startLearn('B2')">🟠 B2 SEVİYESİ</button>
        <button class="btn" style="background:#666" onclick="showScreen('menu-screen')">Geri</button>
    </div>
</div>

<div id="sentence-level-screen" class="screen">
    <div class="card">
        <h3>Cümle Seviyesi Seç</h3>
        <button class="btn btn-red" onclick="startSentence('A1')">A1 Cümleleri</button>
        <button class="btn btn-red" onclick="startSentence('B1')">B1 Cümleleri</button>
        <button class="btn" style="background:#666" onclick="showScreen('menu-screen')">Geri</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="card">
        <div id="game-target" style="font-size:2.5rem; font-weight:900; color:var(--ana); cursor:pointer;" onclick="speak()">Apple</div>
        <div class="hint-text" onclick="toggleHint()">İpucu için dokun 💡</div>
        <div id="hint-box" class="hint-box">Anlamı: Elma</div>
        <input type="text" id="user-input" placeholder="Türkçesi nedir?" style="width:80%; padding:10px; margin-top:15px; border-radius:10px;">
        <button class="btn btn-red" onclick="checkWord()">KONTROL ET</button>
    </div>
    <button class="btn" style="background:none; color:gray;" onclick="showScreen('menu-screen')">Menüye Dön</button>
</div>

<div id="sentence-screen" class="screen">
    <div class="card">
        <p id="s-target" style="font-weight:bold; font-size:1.2rem; color:var(--ana);"></p>
        <div class="sentence-area" id="s-build"></div>
        <div id="s-options"></div>
        <button class="btn btn-green" onclick="checkSentence()">KONTROL ET</button>
    </div>
    <button class="btn" style="background:none; color:gray;" onclick="showScreen('menu-screen')">Menüye Dön</button>
</div>

<div id="dict-screen" class="screen">
    <div class="card">
        <h3>Dev Sözlük (A1-B2)</h3>
        <div id="dict-list" style="max-height: 400px; overflow-y: auto; text-align: left;"></div>
    </div>
    <button class="btn btn-red" onclick="showScreen('menu-screen')">Geri Dön</button>
</div>

<script>
    const data = {
        'A1': [{e:"Apple", t:"Elma"}, {e:"School", t:"Okul"}, {e:"Water", t:"Su"}],
        'A2': [{e:"Describe", t:"Tanımlamak"}, {e:"Schedule", t:"Program"}],
        'B1': [{e:"Improve", t:"Geliştirmek"}, {e:"Conclusion", t:"Sonuç"}],
        'B2': [{e:"Sustainable", t:"Sürdürülebilir"}, {e:"Equivalent", t:"Eşdeğer"}]
    };

    const sentenceData = {
        'A1': [{en:"I go to school", tr:["Ben", "okula", "gidiyorum"]}, {en:"She eats an apple", tr:["O", "bir", "elma", "yer"]}],
        'B1': [{en:"I will improve my English", tr:["Ben", "İngilizcemi", "geliştireceğim"]}]
    };

    let xp = parseInt(localStorage.getItem('mXP') || 0);
    let user = localStorage.getItem('mUser');
    let curLvl = 'A1', curIdx = 0, currentBuild = [];

    if(user) login();

    function saveUser() {
        const val = document.getElementById('name-input').value;
        if(val) { localStorage.setItem('mUser', val); user = val; login(); }
    }

    function login() {
        showScreen('menu-screen');
        document.getElementById('u-name').innerText = user;
        document.getElementById('display-name').innerText = user;
        document.getElementById('u-xp').innerText = xp;
        buildDict();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // --- KELİME MODU ---
    function startLearn(lvl) {
        curLvl = lvl; curIdx = 0; showScreen('game-screen'); loadWord();
    }
    function loadWord() {
        const w = data[curLvl][curIdx % data[curLvl].length];
        document.getElementById('game-target').innerText = w.e;
        document.getElementById('hint-box').innerText = "Anlamı: " + w.t;
        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('user-input').value = "";
    }
    function toggleHint() { 
        const hb = document.getElementById('hint-box');
        hb.style.display = hb.style.display === 'none' ? 'block' : 'none';
    }
    function checkWord() {
        const val = document.getElementById('user-input').value.trim().toLowerCase();
        const correct = data[curLvl][curIdx % data[curLvl].length].t.toLowerCase();
        if(val === correct) { xp += 20; curIdx++; save(); loadWord(); alert("Doğru! 🎉"); }
        else { alert("Yanlış! Doğrusu: " + correct.toUpperCase()); }
    }

    // --- CÜMLE KURMA ---
    function startSentence(lvl) {
        curLvl = lvl; curIdx = 0; showScreen('sentence-screen'); loadSentence();
    }
    function loadSentence() {
        const s = sentenceData[curLvl][curIdx % sentenceData[curLvl].length];
        document.getElementById('s-target').innerText = s.en;
        document.getElementById('s-build').innerHTML = "";
        const opts = document.getElementById('s-options');
        opts.innerHTML = "";
        currentBuild = [];
        [...s.tr].sort(() => Math.random() - 0.5).forEach(word => {
            const btn = document.createElement('div');
            btn.className = "word-box";
            btn.innerText = word;
            btn.onclick = () => {
                currentBuild.push(word);
                btn.style.display = 'none';
                const b = document.createElement('div');
                b.className = "word-box";
                b.innerText = word;
                document.getElementById('s-build').appendChild(b);
            };
            opts.appendChild(btn);
        });
    }
    function checkSentence() {
        const s = sentenceData[curLvl][curIdx % sentenceData[curLvl].length];
        if(JSON.stringify(currentBuild) === JSON.stringify(s.tr)) {
            xp += 50; curIdx++; save(); alert("Cümle Doğru! 🏆"); loadSentence();
        } else {
            alert("Sıralama Yanlış! Tekrar dene."); loadSentence();
        }
    }

    // --- SÖZLÜK ---
    function buildDict() {
        const list = document.getElementById('dict-list');
        list.innerHTML = "";
        Object.keys(data).forEach(lvl => {
            data[lvl].forEach(w => {
                list.innerHTML += `<div class="dict-item"><strong>${w.e}</strong> <span>(${lvl})</span> <span>${w.t}</span></div>`;
            });
        });
    }

    function save() { localStorage.setItem('mXP', xp); document.getElementById('u-xp').innerText = xp; }
    function speak() {
        const msg = new SpeechSynthesisUtterance(document.getElementById('game-target').innerText);
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }
    function reset() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
