<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miran-Lingo TITAN</title>
    <style>
        :root { --ana: #d32f2f; --vurgu: #fbca03; --arka: #fffde7; --yazi: #333; --kart: #fff; }
        .fener-mode { --ana: #003366; --vurgu: #fbca03; --arka: #f5f5f5; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--arka); color: var(--yazi); margin: 0; transition: 0.5s; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* 1. Özellik: İlerleme ve Kombo Barı */
        .top-nav { width: 100%; height: 60px; background: var(--ana); color: white; display: flex; justify-content: space-around; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .combo-meter { font-size: 20px; font-weight: 900; color: var(--vurgu); text-shadow: 0 0 10px orange; }

        /* 4. Özellik: Alev Efekti */
        .on-fire { animation: fire 0.5s infinite alternate; }
        @keyframes fire { from {box-shadow: 0 0 10px red;} to {box-shadow: 0 0 30px orange;} }

        .card { background: var(--kart); border-radius: 30px; padding: 25px; width: 85%; max-width: 400px; margin-top: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-bottom: 8px solid #bbb; }
        
        /* 12. Özellik: Miran-Coin ve XP */
        .shop-icon { font-size: 24px; cursor: pointer; }
        
        input { width: 80%; padding: 15px; border-radius: 15px; border: 3px solid #eee; font-size: 1.1rem; text-align: center; margin-top: 15px; transition: 0.3s; }
        input:focus { border-color: var(--vurgu); transform: scale(1.05); }

        .btn { background: var(--ana); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 15px; cursor: pointer; box-shadow: 0 5px #900; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px #600; }

        /* 6. Özellik: Hayali Sıralama */
        .leaderboard { width: 85%; max-width: 400px; background: rgba(0,0,0,0.05); border-radius: 15px; padding: 10px; margin-top: 15px; font-size: 12px; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="top-nav">
    <div>🪙 <span id="coins">0</span></div>
    <div class="combo-meter">🔥 x<span id="combo">0</span></div>
    <div class="shop-icon" onclick="toggleFener()">⚽</div>
</div>

<div id="game-area" class="card">
    <div style="font-size: 12px; opacity: 0.6;">Rütbe: <span id="rank">Çaylak</span></div>
    <h1 id="target-word" onclick="speak()" style="font-size: 3rem; color: var(--ana); cursor: pointer;">Apple</h1>
    <p id="timer" style="font-weight: bold; color: red;">15s</p>
    <input type="text" id="user-input" placeholder="Türkçesi nedir?" onkeypress="if(event.key==='Enter') check()">
    <button class="btn" onclick="check()">KONTROL ET</button>
    
    <p onclick="getHint()" style="font-size: 12px; color: gray; cursor: pointer; margin-top: 10px;">💡 İpucu Al (10 XP)</p>
</div>

<div class="leaderboard">
    <strong>🏆 Lig Sıralaması</strong>
    <div class="leader-item"><span>1. Miran (Sen)</span> <span id="p-xp">0 XP</span></div>
    <div class="leader-item"><span>2. Arda Güler</span> <span>4500 XP</span></div>
    <div class="leader-item"><span>3. Messi</span> <span>3200 XP</span></div>
</div>

<script>
    const kelimeler = [
        {e:"Success", t:"Başarı"}, {e:"Legend", t:"Efsane"}, {e:"Champion", t:"Şampiyon"}, 
        {e:"Knowledge", t:"Bilgi"}, {e:"Future", t:"Gelecek"}, {e:"Freedom", t:"Özgürlük"}
    ];
    let vocab = [...kelimeler].sort(() => Math.random() - 0.5);
    
    let xp = parseInt(localStorage.getItem('miranXP') || 0);
    let coins = Math.floor(xp / 10);
    let combo = 0, cur = 0, timeLeft = 15, timerInterval;

    function startTimer() {
        timeLeft = 15;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) check(true);
        }, 1000);
    }

    function check(isTimeout = false) {
        const val = document.getElementById('user-input').value.trim().toLowerCase();
        const correct = vocab[cur].t.toLowerCase();
        
        if(!isTimeout && val === correct) {
            xp += 25 + (combo * 5);
            combo++;
            alert(`Adamsın Miran! 🔥 Kombo: ${combo}`);
            if(combo >= 5) document.getElementById('game-area').classList.add('on-fire');
        } else {
            xp = Math.max(0, xp - 10);
            combo = 0;
            document.getElementById('game-area').classList.remove('on-fire');
            alert("Hata! Doğrusu: " + correct.toUpperCase());
        }
        
        save();
        cur = (cur + 1) % vocab.length;
        load();
    }

    function load() {
        document.getElementById('target-word').innerText = vocab[cur].e;
        document.getElementById('user-input').value = "";
        startTimer();
    }

    function getHint() {
        if(xp >= 10) {
            xp -= 10; save();
            const t = vocab[cur].t;
            alert(`İpucu: ${t[0]}...${t[t.length-1]}`);
        }
    }

    function toggleFener() { document.body.classList.toggle('fener-mode'); alert("Fenerbahçe Modu Aktif! 💛💙"); }

    function save() {
        localStorage.setItem('miranXP', xp);
        document.getElementById('p-xp').innerText = xp + " XP";
        document.getElementById('coins').innerText = Math.floor(xp / 10);
        document.getElementById('combo').innerText = combo;
        const ranks = ["Çaylak", "Usta", "Bilgin", "Efsane", "Miran-Hoca"];
        document.getElementById('rank').innerText = ranks[Math.floor(xp/1000)] || "Ölümsüz";
    }

    function speak() {
        const msg = new SpeechSynthesisUtterance(document.getElementById('target-word').innerText);
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    load();
</script>
</body>
</html>
